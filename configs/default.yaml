data:
  data_dir: data
  benchmarks: ["cuad"]
  # "sampled" keeps experiments cheap; use "all" for a full-corpus retrieval run.
  corpus_scope: all

llm:
  provider: anthropic
  api_key_env: ANTHROPIC_API_KEY
  model: claude-haiku-4-5-20251001
  max_tokens: 700
  temperature: 0.0
  pricing:
    input_per_mtok_usd: 1.0
    output_per_mtok_usd: 5.0
    # cache_read_per_mtok_usd: 0.30
    # cache_write_5m_per_mtok_usd: 3.75

vector_rag:
  cache_dir: .cache/vector
  force_reindex: false
  chunk_strategy: hierarchical
  chunk_size: 1200
  chunk_overlap: 120
  embedding_model: BAAI/bge-large-en-v1.5
  query_instruction: "Represent this sentence for searching relevant passages: "
  batch_size: 32
  top_k: 20
  reranker:
    enabled: true
    model: BAAI/bge-reranker-v2-m3
    top_k: 5

pageindex:
  cache_dir: .cache/pageindex
  force_reindex: false
  build_with_llm: true
  virtual_page_target_tokens: 900
  virtual_page_max_tokens: 1200
  toc_check_units: 20
  max_units_per_node: 10
  max_tokens_per_node: 20000
  node_summary_max_tokens: 220
  root_summary_max_tokens: 260
  selected_documents: 5
  max_tree_chars: 24000
  selected_nodes: 10
  max_retrieved_chars_per_node: 5000
  record_reasoning_trajectory: true
  reasoning_max_catalog_chars: 12000
  reasoning_max_node_summary_chars: 320
  # TODO: Use their official repo to implement and see the performance difference

run:
  results_dir: results
  methods: ["vector", "pageindex"]
  n: 10
  seed: 42
  # Retrieval metrics are scored against benchmark snippets, not generated answers.
  answer_with_llm: false
  max_answer_context_chars: 18000

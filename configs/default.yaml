data:
  data_dir: data
  benchmarks: ["cuad"]
  # "sampled" keeps experiments cheap; use "all" for a full-corpus retrieval run.
  corpus_scope: all

llm:
  provider: anthropic
  api_key_env: ANTHROPIC_API_KEY
  model: claude-haiku-4-5-20251001
  max_tokens: 700
  temperature: 0.0
  pricing:
    input_per_mtok_usd: 1.0
    output_per_mtok_usd: 5.0
    # cache_read_per_mtok_usd: 0.30
    # cache_write_5m_per_mtok_usd: 3.75

vector_rag:
  cache_dir: .cache/vector
  force_reindex: false
  chunk_strategy: hierarchical
  search_strategy: vector
  # Default vector runs expand across every chunking x search strategy below.
  evaluate_combinations: true
  # Choose which named model_profiles to run. Use [voyage] for Voyage-only runs.
  selected_model_profiles: [voyage]
  # chunk_strategies: [hierarchical, recursive, fixed, semantic]
  chunk_strategies: [hierarchical, semantic]
  # search_strategies: [vector, hybrid]
  search_strategies: [hybrid]
  chunk_size: 1200
  chunk_overlap: 120
  semantic_chunking:
    break_percentile: 82
    window_size: 3
    min_chunk_size:
  hybrid:
    vector_weight: 0.65
    bm25_weight: 0.35
    bm25_k1: 1.5
    bm25_b: 0.75
  model_profiles:
    - name: bge
      embedding_provider: sentence_transformers
      embedding_model: BAAI/bge-large-en-v1.5
      query_instruction: "Represent this sentence for searching relevant passages: "
      batch_size: 8
      top_k: 20
      reranker:
        enabled: true
        provider: sentence_transformers
        model: BAAI/bge-reranker-v2-m3
        top_k: 5
    - name: voyage
      embedding_provider: voyage
      embedding_model: voyage-law-2
      query_instruction: ""
      batch_size: 128
      top_k: 20
      embedding_output_dimension:
      embedding_truncation: true
      reranker:
        enabled: true
        provider: voyage
        model: rerank-2
        top_k: 5

pageindex:
  cache_dir: .cache/pageindex
  force_reindex: false
  build_with_llm: true
  virtual_page_target_tokens: 900
  virtual_page_max_tokens: 1200
  toc_check_units: 20
  max_units_per_node: 10
  max_tokens_per_node: 20000
  node_summary_max_tokens: 220
  root_summary_max_tokens: 260
  selected_documents: 5
  max_tree_chars: 24000
  selected_nodes: 10
  max_retrieved_chars_per_node: 5000
  record_reasoning_trajectory: true
  reasoning_max_catalog_chars: 12000
  reasoning_max_node_summary_chars: 320

pageindex_official:
  cache_dir: .cache/pageindex_official
  force_reindex: false
  # Uses the official VectifyAI/PageIndex self-hosted repo. If repo_path is empty,
  # the adapter clones repo_url into the cache directory on first use.
  repo_url: https://github.com/VectifyAI/PageIndex.git
  repo_ref: main
  repo_path:
  auto_clone_repo: true
  build_with_llm: true
  virtual_page_target_tokens: 900
  virtual_page_max_tokens: 1200
  if_thinning: false
  thinning_threshold: 5000
  if_add_node_summary: yes
  if_add_doc_description: yes
  if_add_node_text: no
  summary_token_threshold: 200
  selected_documents: 5
  max_document_catalog_chars: 120000
  max_tree_chars: 24000
  selected_nodes: 10
  max_retrieved_chars_per_node: 5000
  record_reasoning_trajectory: true
  reasoning_max_catalog_chars: 12000
  reasoning_max_node_summary_chars: 320
  reasoning_max_trace_nodes: 250

run:
  results_dir: results
  # Set run_id plus merge_results: true to append/replace methods in an existing run folder.
  # run_id: 20260505T172718Z
  merge_results: false
  # Add "pageindex_official" to compare against VectifyAI's official implementation.
  methods: ["vector", "pageindex", "pageindex_official"]
  n: 10
  seed: 42
  # Retrieval metrics are scored against benchmark snippets, not generated answers.
  answer_with_llm: false
  max_answer_context_chars: 18000
